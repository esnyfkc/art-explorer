<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Art Explorer</h1>
    <p>Browse artworks from the Art Institute of Chicago</p>

    <form id="search-form">
      <input
        type="text"
        id="search-input"
        placeholder="Search by artist or artwork title"
      />
      <button type="submit">Search</button>
      <button type="button" id="reset-button">Show Featured</button>
    </form>
  </header>

  <main>
    <section id="art-grid" class="grid"></section>
    <p id="message"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
